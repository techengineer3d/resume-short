{% assign expertise = site.data.expertise_data.expertise %}
{% if expertise %}
<section class="expertise-section section">

  <h2 class="section-title">
    <span class="fa-stack fa-xs">
      <i class="fas fa-circle fa-stack-2x"></i>
      <i class="fas fa-wrench fa-stack-1x fa-inverse"></i>
    </span>
    {{ expertise.title }}
  </h2>

  <div class="area">
    <ul>
    {% for area in expertise.areas %}
    <div class="item">
      <ui>■ {{ area.title }}</ui>
    </div><!--//item-->
    {% endfor %}
    </ul>
  </div>

</section><!--//expertise-section-->
{% endif %}
